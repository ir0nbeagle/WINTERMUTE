name: Export IOCs

on:
  push:
    branches: [main]
    paths:
      - 'threat-intel/**/report.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run metrics parser (includes report data)
        run: python3 -B scripts/parse_metrics.py

      - name: Export IOCs (STIX + MISP + CSV)
        run: python3 -B scripts/export_iocs.py

      - name: Commit exports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exports/ metrics/summary.json
          git diff --cached --quiet || git commit -m "chore: update IOC exports and metrics [skip ci]"
          git push

name: Weekly Executive Report

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate metrics
        run: python3 -B scripts/parse_metrics.py

      - name: Stamp report date
        run: |
          WEEK=$(date +"%Y-W%V")
          cp reports/dashboard.html "reports/archive/dashboard-${WEEK}.html" 2>/dev/null || true
          mkdir -p reports/archive
          cp reports/dashboard.html "reports/archive/dashboard-${WEEK}.html"

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics/summary.json reports/archive/
          git diff --cached --quiet || git commit -m "report: weekly metrics $(date +%Y-%m-%d)"
          git push
